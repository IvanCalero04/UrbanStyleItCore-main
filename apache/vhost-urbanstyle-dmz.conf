## Apache2 (EC2 pública DMZ) - Proxy hacia backend en privada
##
## Requisitos (módulos):
##   a2enmod proxy proxy_http headers ssl rewrite
##
## Ajusta:
## - ServerName
## - certificados (LetsEncrypt)
## - IP privada y puerto del backend (ProxyPass /api ...)
##

<VirtualHost *:443>
  ServerName tu-dominio.com

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/tu-dominio.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/tu-dominio.com/privkey.pem

  # Sirve tu web estática (ajusta a tu DocumentRoot real)
  DocumentRoot /var/www/urbanstyle
  <Directory /var/www/urbanstyle>
    AllowOverride All
    Require all granted
  </Directory>

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  # API hacia EC2 privada (backend Docker)
  ProxyPass        /api/ http://10.0.2.10:3000/api/
  ProxyPassReverse /api/ http://10.0.2.10:3000/api/

  ErrorLog ${APACHE_LOG_DIR}/urbanstyle_error.log
  CustomLog ${APACHE_LOG_DIR}/urbanstyle_access.log combined
</VirtualHost>

<VirtualHost *:80>
  ServerName tu-dominio.com
  RewriteEngine on
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

